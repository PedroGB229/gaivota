<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{ vite('resources/css/app.css') }}
    <title>Gaivota Tech — Login</title>
</head>

<body class="login-page">

    <!-- ══ FOTO DA GAIVOTA ══════════════════════════════════════════════
         Para colocar sua foto:
         1. Salve a imagem em public/img/gaivota.jpg
         2. Remova o bloco .login-photo__placeholder
         3. Adicione: <img src="/img/gaivota.jpg" alt="Gaivota">
    ═══════════════════════════════════════════════════════════════════ -->
    <div class="login-photo">
        <div class="login-photo__placeholder">
           <img src="/img/gaivota.jpg" alt="Gaivota">
        <div class="login-photo__overlay"></div>
    </div>

    <!-- ══ CARD DO FORMULÁRIO ══════════════════════════════════════════ -->
    <div class="login-card">

        <div class="login-logo">
            <div class="login-logo__icon">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 20 Q11 8 17 7 Q23 6 25 15 Q20 11 14 13 Q10 14 6 20Z" fill="#1d4ed8"/>
                    <path d="M6 20 Q3 18 1 21 Q3 19 6 20Z" fill="#3b82f6"/>
                    <path d="M25 15 Q28 13 30 16 Q28 14 25 15Z" fill="#3b82f6"/>
                    <ellipse cx="18" cy="10" rx="2.5" ry="3" fill="#1e3a8a"/>
                    <circle cx="17" cy="9" r="0.8" fill="#93c5fd"/>
                    <path d="M20 11.5 L24 12.5 L20.5 13.5Z" fill="#f59e0b"/>
                </svg>
            </div>
            <div>
                <div class="login-logo__name">gaivota<span>_tech</span></div>
                <div class="login-logo__sub">Sistema de gestão empresarial</div>
            </div>
        </div>

        <div style="text-align:center">
            <div class="login-badge">
                <span class="login-badge__dot"></span>
                Sistema operacional
            </div>
        </div>

        <div class="login-divider"></div>

        <form id="form">
            <div class="login-field">
                <label for="login">Usuário</label>
                <div class="input-wrap">
                    <i class="fa fa-user"></i>
                    <input type="text" id="login" name="login"
                        placeholder="CPF, telefone ou e-mail" autofocus>
                </div>
            </div>

            <div class="login-field">
                <label for="senha">Senha</label>
                <div class="input-wrap">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="senha" name="senha"
                        placeholder="••••••••">
                </div>
            </div>

            <button id="btnLogin" type="button" class="login-btn">
                Entrar no sistema
            </button>
        </form>

        <div class="login-sep"><span>ou continue com</span></div>

        <button id="loginGoogle" type="button" class="login-btn-google">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Entrar com Google
        </button>

        <div class="login-foot">
            Problemas de acesso? <a href="#">Fale com o suporte</a>
        </div>

    </div>

    {{ vite('resources/js/app.js') }}
</body>

</html>
