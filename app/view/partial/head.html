<script>
(function () {
    const btn = document.getElementById('btnLogout');
    if (!btn) return;

    btn.addEventListener('click', async function () {
        // Confirma antes de sair
        const confirmado = window.Swal
            ? await Swal.fire({
                title: 'Finalizar sessão?',
                text: 'Você será desconectado do sistema.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Sim, sair',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#dc2626',
            }).then(r => r.isConfirmed)
            : confirm('Deseja finalizar a sessão?');

        if (!confirmado) return;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Saindo…';

        // Redireciona para a rota de logout (GET /auth/logout)
        // O servidor destrói a sessão, apaga o cookie e redireciona para /login
        window.location.href = '/auth/logout';
    });
})();
</script>
